<!-- You must include this JavaScript file -->
<script src="https://assets.crowd.aws/crowd-html-elements.js"></script>

<!-- You must include crowd-form so that your task submits answers to MTurk -->
<crowd-form answer-format="flatten-objects">

    <crowd-classifier
      name="category"
      categories="['Video A', 'Video B']"
      header="Choose the video according to the question"
    >

        <classification-target>
          <p style="text-align: center; font-weight: bold; font-size: 18px;">${question}</p>
          <p style="text-align: center; color: #666; font-size: 14px;">${prompt}</p>

          <div style="display: flex; gap: 20px; justify-content: center; margin-top: 20px;">

            <!-- Video A -->
            <div style="flex: 1; text-align: center; max-width: 45%;">
              <video controls autoplay muted loop playsinline style="width: 100%; max-height: 500px; border: 2px solid #ddd; border-radius: 8px;">
                <source src="${video_a_url}" type="video/mp4">
                Your browser does not support the video tag.
              </video>
              <p style="font-weight: bold; margin-top: 10px;">Video A</p>
            </div>

            <!-- Video B -->
            <div style="flex: 1; text-align: center; max-width: 45%;">
              <video controls autoplay muted loop playsinline style="width: 100%; max-height: 500px; border: 2px solid #ddd; border-radius: 8px;">
                <source src="${video_b_url}" type="video/mp4">
                Your browser does not support the video tag.
              </video>
              <p style="font-weight: bold; margin-top: 10px;">Video B</p>
            </div>

          </div>

          <!-- Added space at the end -->
          <div style="height: 100px;"></div>

        </classification-target>

    </crowd-classifier>
</crowd-form>
